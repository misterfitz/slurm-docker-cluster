# slurm.conf - Slurm configuration file
# Generated by: playground/scale.sh
# Timestamp: 2026-01-25T03:50:08Z
#
# See slurm.conf(5) for more information.

#
# Cluster Identity
#
ClusterName=linux
SlurmctldHost=slurmctld

#
# Authentication
#
AuthType=auth/munge

#
# Paths
#
SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmctldPort=6817
SlurmdPidFile=/var/run/slurm/slurmd.pid
SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurm
SlurmUser=slurm
StateSaveLocation=/var/lib/slurm

#
# Process Tracking
#
ProctrackType=proctrack/linuxproc
TaskPlugin=task/affinity

#
# Timers
#
InactiveLimit=0
KillWait=30
MinJobAge=300
SlurmctldTimeout=120
SlurmdTimeout=300
Waittime=0

#
# Scheduling
#
SchedulerType=sched/backfill
SelectType=select/cons_tres

#
# Priority - Multifactor
#
PriorityType=priority/multifactor
PriorityDecayHalfLife=7-0
PriorityFavorSmall=NO
PriorityMaxAge=7-0
PriorityUsageResetPeriod=MONTHLY
PriorityWeightAge=1000
PriorityWeightFairshare=10000
PriorityWeightJobSize=500
PriorityWeightPartition=1000
PriorityWeightQOS=2000
AccountingStorageEnforce=associations,limits,qos

#
# Service Behavior
#
ReturnToService=1

#
# Accounting
#
AccountingStorageHost=slurmdbd
AccountingStorageType=accounting_storage/slurmdbd
JobCompLoc=/var/log/slurm/jobcomp.log
JobCompType=jobcomp/filetxt
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30

#
# Logging
#
SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/slurmd.log



#
# Compute Nodes
#
NodeName=c[1-5] CPUs=2 RealMemory=1000 State=UNKNOWN
#
# Partitions
#
PartitionName=normal Nodes=c[1-5] Default=YES MaxTime=INFINITE State=UP
